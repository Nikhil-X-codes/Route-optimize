services:
  - type: web
    name: route-optimizer-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:3000,https://route-optimizer.vercel.app
    healthCheckPath: /health